version: 2
mode: shadow
domain_allowlist:
  - internal.com
file_path_allowlist:
  - /tmp/safe
pii_action: block
block_egress: true
capability_policy:
  network_send: warn
  file_read: allow
default_action: warn

tools:
  send_email:
    capabilities: [network_send]
    domain_allowlist: [mail.internal]
    pii_action: warn
    mode: enforce
  read_file:
    capabilities: [file_read]
    file_path_allowlist: [/tmp/safe, /data/reports]
  run_query:
    capabilities: [db_access]
