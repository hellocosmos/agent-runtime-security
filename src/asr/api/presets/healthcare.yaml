# Healthcare preset.
# Optimized for EMR, patient-data, and medication workflows with strong PHI protection.

version: 1
mode: enforce

block_egress: true

domain_allowlist:
  - "*.internal.hospital.com"
  - "emr.hospital.com"
  - "pacs.hospital.com"
  - "api.hl7.org"
  - "fhir.hospital.com"
  - "api.drugs.com"
  - "rxnav.nlm.nih.gov"

pii_action: block

file_path_allowlist:
  - "/srv/medical-workspace"
  - "/tmp/medical-safe"

tool_blocklist:
  - shell_exec
  - eval
  - exec
  - os_command
  - sudo
  - admin_api
  - delete_database
  - drop_table
  - modify_permissions
  - delete_patient_record
  - modify_prescription
  - export_patient_data
  - bulk_delete
  - merge_patient_records

capability_policy:
  network_send: block
  webhook_call: block
  email_send: warn

  shell_exec: block
  filesystem_write: warn
  filesystem_delete: block

  credential_access: block
  secret_access: block
  admin_action: block
  permission_change: block

  database_write: warn
  database_delete: block
  bulk_export: block

  patient_data_read: warn
  patient_data_write: warn
  prescription_read: warn
  lab_result_access: warn

default_action: warn
