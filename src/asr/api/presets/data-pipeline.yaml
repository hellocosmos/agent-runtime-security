# Data pipeline preset for ETL, warehousing, analytics, and ML-prep workflows.
# Large-scale reads are expected, but uncontrolled external transfer is not.

version: 1
mode: enforce

block_egress: true

domain_allowlist:
  - "*.internal.company.com"
  - "warehouse.company.com"
  - "datalake.company.com"
  - "*.bigquery.googleapis.com"
  - "*.redshift.amazonaws.com"
  - "*.snowflakecomputing.com"
  - "catalog.company.com"
  - "hooks.slack.com"

pii_action: warn

file_path_allowlist:
  - "/srv/data-pipeline"
  - "/tmp/pipeline-staging"
  - "/data/warehouse"
  - "/data/lake"

tool_blocklist:
  - shell_exec
  - eval
  - exec
  - os_command
  - sudo
  - admin_api
  - modify_permissions
  - drop_database
  - truncate_all_tables
  - delete_dataset

capability_policy:
  network_send: block
  webhook_call: warn
  email_send: warn

  shell_exec: block
  filesystem_write: warn
  filesystem_delete: warn

  credential_access: block
  secret_access: block
  admin_action: block
  permission_change: block

  database_write: warn
  database_delete: block
  bulk_export: warn

  query_execute: warn
  schema_modify: block
  data_transform: warn

default_action: warn
