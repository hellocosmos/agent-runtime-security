# Ecommerce preset for order, inventory, payment, shipping, and promotion workflows.
# Keeps payment data strict while allowing approved commerce infrastructure.

version: 1
mode: enforce

block_egress: true

domain_allowlist:
  - "*.internal.company.com"
  - "shop.company.com"
  - "admin.company.com"
  - "api.stripe.com"
  - "api.paypal.com"
  - "api.toss.im"
  - "api.inicis.com"
  - "api.fedex.com"
  - "api.ups.com"
  - "api.cjlogistics.com"
  - "api.hanjin.com"
  - "api.mailchimp.com"
  - "hooks.slack.com"

pii_action: block

file_path_allowlist:
  - "/srv/ecommerce-workspace"
  - "/tmp/ecommerce-safe"

tool_blocklist:
  - shell_exec
  - eval
  - exec
  - os_command
  - sudo
  - admin_api
  - delete_database
  - drop_table
  - modify_permissions
  - delete_all_orders
  - modify_price_global
  - bulk_refund
  - export_all_customers
  - modify_payment_config

capability_policy:
  network_send: warn
  webhook_call: warn
  email_send: warn

  shell_exec: block
  filesystem_write: warn
  filesystem_delete: block

  credential_access: block
  secret_access: block
  admin_action: block
  permission_change: block

  database_write: warn
  database_delete: block
  bulk_export: block

  order_modify: warn
  price_modify: warn
  refund_process: warn
  inventory_modify: warn
  promotion_modify: warn

default_action: warn
