# Research and R&D preset.
# Keeps academic and package access flexible while protecting unpublished work and IP.

version: 1
mode: enforce

block_egress: true

domain_allowlist:
  - "*.internal.company.com"
  - "lab.company.com"
  - "jupyter.company.com"
  - "git.company.com"
  - "api.semanticscholar.org"
  - "api.crossref.org"
  - "api.openalex.org"
  - "arxiv.org"
  - "pubmed.ncbi.nlm.nih.gov"
  - "pypi.org"
  - "registry.npmjs.org"
  - "github.com"
  - "api.github.com"
  - "*.googleapis.com"
  - "*.amazonaws.com"

pii_action: warn

file_path_allowlist:
  - "/srv/research"
  - "/tmp/research-staging"
  - "/data/experiments"
  - "/home/agent/notebooks"

tool_blocklist:
  - eval
  - exec
  - sudo
  - admin_api
  - delete_database
  - drop_table
  - modify_permissions
  - share_ip_externally
  - publish_unpublished
  - export_source_code

capability_policy:
  network_send: warn
  webhook_call: warn
  email_send: warn

  shell_exec: warn
  filesystem_write: warn
  filesystem_delete: warn

  credential_access: block
  secret_access: block
  admin_action: block
  permission_change: block

  database_write: warn
  database_delete: block
  bulk_export: warn

  code_execute: warn
  data_download: warn
  model_train: warn

default_action: warn
