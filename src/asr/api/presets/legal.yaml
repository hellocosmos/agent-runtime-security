# Legal and compliance preset.
# Designed for contracts, casework, regulatory review, and evidence-preservation workflows.

version: 1
mode: enforce

block_egress: true

domain_allowlist:
  - "*.internal.company.com"
  - "legal.company.com"
  - "contracts.company.com"
  - "api.westlaw.com"
  - "api.lexisnexis.com"
  - "lbox.kr"
  - "api.docusign.com"
  - "api.adobesign.com"

pii_action: block

file_path_allowlist:
  - "/srv/legal-workspace"
  - "/tmp/legal-safe"

tool_blocklist:
  - shell_exec
  - eval
  - exec
  - os_command
  - sudo
  - admin_api
  - delete_database
  - drop_table
  - modify_permissions
  - delete_contract
  - delete_case
  - modify_evidence
  - bulk_delete
  - export_all_contracts
  - share_externally

capability_policy:
  network_send: block
  webhook_call: block
  email_send: warn

  shell_exec: block
  filesystem_write: warn
  filesystem_delete: block

  credential_access: block
  secret_access: block
  admin_action: block
  permission_change: block

  database_write: warn
  database_delete: block
  bulk_export: block

  contract_access: warn
  case_access: warn
  document_modify: warn

default_action: warn
