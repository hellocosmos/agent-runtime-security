# Finance and fintech preset.
# Built for highly regulated payment, account, and trading workflows.

version: 1
mode: enforce

block_egress: true

domain_allowlist:
  - "*.internal.company.com"
  - "core-banking.company.com"
  - "payment-gateway.company.com"
  - "api.stripe.com"
  - "api.paypal.com"
  - "api.adyen.com"
  - "api.bloomberg.com"
  - "api.refinitiv.com"
  - "reporting.regulator.gov"

# Treat financial-data leakage as a hard stop.
pii_action: block

file_path_allowlist:
  - "/srv/finance-workspace"
  - "/tmp/finance-safe"

tool_blocklist:
  - shell_exec
  - eval
  - exec
  - os_command
  - sudo
  - admin_api
  - delete_database
  - drop_table
  - modify_permissions
  - bulk_transfer
  - wire_transfer
  - update_account_limits
  - create_card
  - close_account

capability_policy:
  network_send: block
  webhook_call: block
  email_send: warn

  shell_exec: block
  filesystem_write: warn
  filesystem_delete: block

  credential_access: block
  secret_access: block
  admin_action: block
  permission_change: block

  database_write: warn
  database_delete: block
  bulk_export: block

  payment_process: warn
  fund_transfer: warn
  account_modify: block
  trading_execute: warn

default_action: warn
