# ============================================================
# TrapDefense Preset: Browser Agent
# ============================================================
# Target: Browser-using agents that navigate pages, fill forms,
#         take screenshots, download files, and interact with web UIs
#
# Posture:
#   - URL navigation restricted to allowlisted domains
#   - Form submission and file upload strictly controlled
#   - Cookie/session/credential extraction blocked
#   - Download destinations restricted
#   - Screenshot and clipboard access logged
# ============================================================

version: 1
mode: enforce

block_egress: true

domain_allowlist:
  # Internal apps
  - "*.internal.company.com"
  - "intranet.company.com"
  # Approved external services (customize per deployment)
  - "docs.google.com"
  - "sheets.google.com"
  - "www.notion.so"
  - "app.slack.com"

pii_action: warn

file_path_allowlist:
  - "/tmp/browser-downloads"
  - "/srv/browser-workspace"

tool_blocklist:
  - shell_exec
  - eval
  - exec
  - os_command
  - sudo
  - admin_api
  - delete_database
  - drop_table
  - modify_permissions
  - extract_cookies
  - export_session
  - read_local_storage
  - capture_credentials

capability_policy:
  # Navigation — controlled
  network_send: warn
  webhook_call: block
  email_send: block
  # Browser-specific
  form_submit: warn
  file_upload: block
  file_download: warn
  screenshot: warn
  clipboard_access: warn
  # Security
  credential_access: block
  secret_access: block
  cookie_access: block
  session_access: block
  # System
  shell_exec: block
  filesystem_write: warn
  filesystem_delete: block
  admin_action: block
  permission_change: block
  database_write: block
  database_delete: block
  bulk_export: block

default_action: warn
