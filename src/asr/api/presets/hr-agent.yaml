# HR and people-systems preset.
# Prioritizes employee privacy, compensation controls, and export restrictions.

version: 1
mode: enforce

block_egress: true

domain_allowlist:
  - "*.internal.company.com"
  - "hr.company.com"
  - "payroll.company.com"
  - "api.workday.com"
  - "api.bamboohr.com"
  - "api.greenhouse.io"
  - "sso.company.com"
  - "login.microsoftonline.com"

pii_action: block

file_path_allowlist:
  - "/srv/hr-workspace"
  - "/tmp/hr-safe"

tool_blocklist:
  - shell_exec
  - eval
  - exec
  - os_command
  - sudo
  - admin_api
  - delete_database
  - drop_table
  - modify_permissions
  - delete_employee
  - modify_salary
  - modify_compensation
  - export_all_employees
  - bulk_delete
  - modify_access_level

capability_policy:
  network_send: block
  webhook_call: block
  email_send: warn

  shell_exec: block
  filesystem_write: warn
  filesystem_delete: block

  credential_access: block
  secret_access: block
  admin_action: block
  permission_change: block

  database_write: warn
  database_delete: block
  bulk_export: block

  employee_data_read: warn
  salary_access: warn
  performance_access: warn

default_action: warn
