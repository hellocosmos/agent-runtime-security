# ============================================================
# TrapDefense Preset: DevOps / CI-CD Agent
# ============================================================
# 대상: DevOps 자동화 에이전트 (CI/CD 파이프라인, 인프라 관리,
#       배포 자동화, 모니터링 알림 처리 등)
#
# 특징:
#   - 쉘 명령 실행을 제한적으로 허용 (warn)
#   - 네트워크 접근 범위가 넓음 (CI/CD 도구 연동)
#   - 인프라 변경/삭제는 엄격히 통제
#   - 시크릿/인증 정보 접근에 대한 감사
#
# 사용법:
#   POST /api/v1/decide
#   { "tool_name": "deploy_service", "args": {...}, "policy_preset": "devops" }
# ============================================================

version: 1
mode: enforce

# ── 외부 전송 통제 ───────────────────��─────────────────────────
block_egress: true

domain_allowlist:
  # CI/CD 플랫폼
  - "github.com"
  - "api.github.com"
  - "gitlab.com"
  - "*.gitlab.io"
  - "app.circleci.com"
  # 컨테이너 레지스트리
  - "*.docker.io"
  - "*.gcr.io"
  - "*.ecr.aws"
  - "ghcr.io"
  # 클라우드 API
  - "*.amazonaws.com"
  - "*.googleapis.com"
  - "management.azure.com"
  # 모니터링/알림
  - "api.pagerduty.com"
  - "api.datadoghq.com"
  - "hooks.slack.com"
  # 패키지 레지스트리
  - "registry.npmjs.org"
  - "pypi.org"

# ── 민감���보 보호 ──────────────────────────��───────────────────
pii_action: warn

file_path_allowlist:
  - "/srv/devops"
  - "/tmp/ci"
  - "/home/agent/workspace"
  - "/var/log"

# ── 고위험 도구 차단 ──────────────────────────��────────────────
tool_blocklist:
  - eval
  - exec
  - sudo
  - delete_database
  - drop_table
  - destroy_cluster       # 클러스터 삭제
  - delete_namespace      # K8s 네임스페이스 삭제
  - modify_iam            # IAM 권한 변경
  - delete_bucket         # 스토리지 버킷 삭제
  - rotate_root_key       # 루트 키 교체

capability_policy:
  # 외부 전송 — CI/CD에 필요하므로 warn
  network_send: warn
  webhook_call: warn
  email_send: warn

  # 시스템 접�� — DevOps 특성상 쉘 warn (단, block이 아님)
  shell_exec: warn
  filesystem_write: warn
  filesystem_delete: warn

  # 권한/인증 — 엄격
  credential_access: warn   # CI 시크릿 접근은 로깅 필수
  secret_access: warn
  admin_action: block
  permission_change: block

  # 데이터 접근
  database_write: warn
  database_delete: block
  bulk_export: warn

  # DevOps 특화
  deploy: warn               # 배포 실행 — 로깅 필수
  infra_provision: warn      # 인프라 프로비저닝 — 로깅
  infra_destroy: block       # 인프라 삭제 — 차단
  config_change: warn        # 설정 변경 — 로깅

default_action: warn
