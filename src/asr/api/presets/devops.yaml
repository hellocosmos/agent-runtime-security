# DevOps and CI/CD preset.
# Shell execution is warning-only because real automation often needs it, but destructive infrastructure changes remain blocked.

version: 1
mode: enforce

block_egress: true

domain_allowlist:
  - "github.com"
  - "api.github.com"
  - "gitlab.com"
  - "*.gitlab.io"
  - "app.circleci.com"
  - "*.docker.io"
  - "*.gcr.io"
  - "*.ecr.aws"
  - "ghcr.io"
  - "*.amazonaws.com"
  - "*.googleapis.com"
  - "management.azure.com"
  - "api.pagerduty.com"
  - "api.datadoghq.com"
  - "hooks.slack.com"
  - "registry.npmjs.org"
  - "pypi.org"

pii_action: warn

file_path_allowlist:
  - "/srv/devops"
  - "/tmp/ci"
  - "/home/agent/workspace"
  - "/var/log"

tool_blocklist:
  - eval
  - exec
  - sudo
  - delete_database
  - drop_table
  - destroy_cluster
  - delete_namespace
  - modify_iam
  - delete_bucket
  - rotate_root_key

capability_policy:
  network_send: warn
  webhook_call: warn
  email_send: warn

  shell_exec: warn
  filesystem_write: warn
  filesystem_delete: warn

  credential_access: warn
  secret_access: warn
  admin_action: block
  permission_change: block

  database_write: warn
  database_delete: block
  bulk_export: warn

  deploy: warn
  infra_provision: warn
  infra_destroy: block
  config_change: warn

default_action: warn
